specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: SyndicateFactory
    network: base-sepolia
    source:
      address: "0x60bf54dDce61ece85BE5e66CBaA17cC312DEa6C8"
      abi: SyndicateFactory
      startBlock: 39036984
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Syndicate
        - VaultLookup
      abis:
        - name: SyndicateFactory
          file: ../out/SyndicateFactory.sol/SyndicateFactory.json
        - name: SyndicateVault
          file: ../out/SyndicateVault.sol/SyndicateVault.json
      eventHandlers:
        - event: SyndicateCreated(indexed uint256,indexed address,indexed address,string,string)
          handler: handleSyndicateCreated
        - event: MetadataUpdated(indexed uint256,string)
          handler: handleMetadataUpdated
        - event: SyndicateDeactivated(indexed uint256)
          handler: handleSyndicateDeactivated
      file: ./src/factory.ts

  - kind: ethereum
    name: SyndicateGovernor
    network: base-sepolia
    source:
      address: "0xB478cdb99260F46191C9e5Da405F7E70eEA23dE4"
      abi: SyndicateGovernor
      startBlock: 39036984
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
        - Syndicate
        - VaultLookup
      abis:
        - name: SyndicateGovernor
          file: ../out/SyndicateGovernor.sol/SyndicateGovernor.json
      eventHandlers:
        - event: ProposalCreated(indexed uint256,indexed address,indexed address,uint256,uint256,uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed uint256,indexed address,bool,uint256)
          handler: handleVoteCast
        - event: ProposalExecuted(indexed uint256,indexed address,uint256)
          handler: handleProposalExecuted
        - event: ProposalSettled(indexed uint256,indexed address,int256,uint256,uint256)
          handler: handleProposalSettled
        - event: ProposalCancelled(indexed uint256,indexed address)
          handler: handleProposalCancelled
        - event: AgentSettled(indexed uint256,indexed address,int256,uint256)
          handler: handleAgentSettled
        - event: EmergencySettled(indexed uint256,indexed address,int256,uint256)
          handler: handleEmergencySettled
      file: ./src/governor.ts

templates:
  - kind: ethereum
    name: SyndicateVault
    network: base-sepolia
    source:
      abi: SyndicateVault
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Syndicate
        - Agent
        - Deposit
        - Withdrawal
        - Depositor
        - Ragequit
        - VaultLookup
      abis:
        - name: SyndicateVault
          file: ../out/SyndicateVault.sol/SyndicateVault.json
      eventHandlers:
        # Agent management
        - event: AgentRegistered(indexed uint256,indexed address,indexed address)
          handler: handleAgentRegistered
        - event: AgentRemoved(indexed address)
          handler: handleAgentRemoved
        # LP events (ERC-4626)
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        # Ragequit
        - event: Ragequit(indexed address,uint256,uint256)
          handler: handleRagequit
        # Depositor whitelist
        - event: DepositorApproved(indexed address)
          handler: handleDepositorApproved
        - event: DepositorRemoved(indexed address)
          handler: handleDepositorRemoved
        # Config changes
        - event: OpenDepositsUpdated(bool)
          handler: handleOpenDepositsUpdated
        # Governor integration
        - event: GovernorUpdated(indexed address,indexed address)
          handler: handleGovernorUpdated
        - event: RedemptionsLockedEvent()
          handler: handleRedemptionsLocked
        - event: RedemptionsUnlockedEvent()
          handler: handleRedemptionsUnlocked
      file: ./src/vault.ts
