specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: SyndicateFactory
    network: base
    source:
      abi: SyndicateFactory
      address: "0x4a761D4C101a3aaDE53C7aA2b5c3278b217B6C29"
      startBlock: 44700877
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Syndicate
        - VaultLookup
      abis:
        - name: SyndicateFactory
          file: ../out/SyndicateFactory.sol/SyndicateFactory.json
        - name: SyndicateVault
          file: ../out/SyndicateVault.sol/SyndicateVault.json
        - name: ERC20
          file: ../out/ERC20.sol/ERC20.json
      eventHandlers:
        - event: SyndicateCreated(indexed uint256,indexed address,indexed
            address,string,string)
          handler: handleSyndicateCreated
        - event: MetadataUpdated(indexed uint256,string)
          handler: handleMetadataUpdated
        - event: SyndicateDeactivated(indexed uint256)
          handler: handleSyndicateDeactivated
      file: ./src/factory.ts
  - kind: ethereum
    name: SyndicateGovernor
    network: base
    source:
      abi: SyndicateGovernor
      address: "0x2F7C27007AC5Bad8400EaDBcdaa767597cfE186a"
      startBlock: 44700877
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
        - Syndicate
        - VaultLookup
      abis:
        - name: SyndicateGovernor
          file: ../out/SyndicateGovernor.sol/SyndicateGovernor.json
      eventHandlers:
        - event: ProposalCreated(indexed uint256,indexed address,indexed
            address,uint256,uint256,uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed uint256,indexed address,uint8,uint256)
          handler: handleVoteCast
        - event: ProposalExecuted(indexed uint256,indexed address,uint256)
          handler: handleProposalExecuted
        - event: ProposalSettled(indexed uint256,indexed address,int256,uint256,uint256)
          handler: handleProposalSettled
        - event: ProposalCancelled(indexed uint256,indexed address)
          handler: handleProposalCancelled
        - event: EmergencySettled(indexed uint256,indexed address,int256,uint256)
          handler: handleEmergencySettled
        - event: ProposalVetoed(indexed uint256,indexed address)
          handler: handleProposalVetoed
        - event: CollaborativeProposalCreated(indexed uint256,indexed
            address,address[],uint256[])
          handler: handleCollaborativeProposalCreated
        - event: CollaborationApproved(indexed uint256,indexed address)
          handler: handleCollaborationApproved
        - event: CollaborationRejected(indexed uint256,indexed address)
          handler: handleCollaborationRejected
        - event: CollaborationTransitionedToPending(indexed uint256)
          handler: handleCollaborationTransitionedToPending
      file: ./src/governor.ts
templates:
  - kind: ethereum
    name: SyndicateVault
    network: base
    source:
      abi: SyndicateVault
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Syndicate
        - Agent
        - Deposit
        - Withdrawal
        - Depositor
        - VaultLookup
      abis:
        - name: SyndicateVault
          file: ../out/SyndicateVault.sol/SyndicateVault.json
        - name: ERC20
          file: ../out/ERC20.sol/ERC20.json
      eventHandlers:
        - event: AgentRegistered(indexed uint256,indexed address)
          handler: handleAgentRegistered
        - event: AgentRemoved(indexed address)
          handler: handleAgentRemoved
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: DepositorApproved(indexed address)
          handler: handleDepositorApproved
        - event: DepositorRemoved(indexed address)
          handler: handleDepositorRemoved
        - event: OpenDepositsUpdated(bool)
          handler: handleOpenDepositsUpdated
      file: ./src/vault.ts
