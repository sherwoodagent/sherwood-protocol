"""
Syndicate — top-level entity created by the factory.
"""
type Syndicate @entity(immutable: false) {
  id: ID! # syndicateId from factory
  vault: Bytes! # vault proxy address
  creator: Bytes!
  metadataURI: String!
  subdomain: String!
  createdAt: BigInt!
  active: Boolean!
  redemptionsLocked: Boolean!

  # Aggregated stats
  totalDeposits: BigDecimal!
  totalWithdrawals: BigDecimal!

  # Relations
  agents: [Agent!]! @derivedFrom(field: "syndicate")
  deposits: [Deposit!]! @derivedFrom(field: "syndicate")
  withdrawals: [Withdrawal!]! @derivedFrom(field: "syndicate")
  depositors: [Depositor!]! @derivedFrom(field: "syndicate")
  proposals: [Proposal!]! @derivedFrom(field: "syndicate")
}

"""
VaultLookup — reverse mapping from vault address to syndicate.
Used by governor handlers to resolve syndicate from vault address.
"""
type VaultLookup @entity(immutable: true) {
  id: ID! # vault address (lowercase hex)
  syndicate: Syndicate!
}

"""
Agent — a registered PKP wallet that can execute strategies.
"""
type Agent @entity(immutable: false) {
  id: ID! # vault-pkpAddress
  syndicate: Syndicate!
  agentId: BigInt!
  pkpAddress: Bytes!
  operatorEOA: Bytes!
  active: Boolean!
  registeredAt: BigInt!

  # Aggregated stats
  totalBatches: BigInt!
  totalAssetAmount: BigInt!
}

"""
Deposit — LP deposits USDC into a vault.
"""
type Deposit @entity(immutable: true) {
  id: ID! # tx hash - log index
  syndicate: Syndicate!
  sender: Bytes!
  owner: Bytes!
  assets: BigInt!
  shares: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

"""
Withdrawal — LP withdraws from a vault (including ragequit).
"""
type Withdrawal @entity(immutable: true) {
  id: ID! # tx hash - log index
  syndicate: Syndicate!
  sender: Bytes!
  receiver: Bytes!
  owner: Bytes!
  assets: BigInt!
  shares: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

"""
Depositor — an address approved to deposit into a vault.
"""
type Depositor @entity(immutable: false) {
  id: ID! # vault-depositorAddress
  syndicate: Syndicate!
  address: Bytes!
  approved: Boolean!
  approvedAt: BigInt!
}

"""
Ragequit — LP exits vault for pro-rata share (subset of withdrawals).
"""
type Ragequit @entity(immutable: true) {
  id: ID! # tx hash - log index
  syndicate: Syndicate!
  lp: Bytes!
  shares: BigInt!
  assets: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

"""
Proposal — an agent's strategy proposal submitted to the governor.
"""
type Proposal @entity(immutable: false) {
  id: ID! # proposalId
  syndicate: Syndicate!
  vault: Bytes!
  proposer: Bytes!
  metadataURI: String!
  performanceFeeBps: BigInt!
  strategyDuration: BigInt!
  splitIndex: BigInt!
  callCount: BigInt!
  state: String! # Pending, Approved, Rejected, Expired, Executed, Settled, Cancelled
  capitalSnapshot: BigInt
  finalPnl: BigInt
  performanceFee: BigInt
  createdAt: BigInt!
  executedAt: BigInt
  settledAt: BigInt
  txHash: Bytes!
  votes: [Vote!]! @derivedFrom(field: "proposal")
}

"""
Vote — a shareholder's vote on a proposal.
"""
type Vote @entity(immutable: true) {
  id: ID! # proposalId-voter
  proposal: Proposal!
  voter: Bytes!
  support: Boolean!
  weight: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}
